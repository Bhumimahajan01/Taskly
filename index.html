<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Taskly</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="container">
  <header>
    <p class="label">🌸 my little planner</p>
    <h1>To-Do List</h1>
    <p class="subtitle"><span id="task-count">0</span> tasks remaining ✨</p>
  </header>

  <div class="input-row">
    <input type="text" id="task-input" placeholder="Add something cute to do... 🌷" maxlength="120" autocomplete="off"/>
    <button id="add-btn" title="Add task">+</button>
  </div>

  <div class="filters">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="active">Active</button>
    <button class="filter-btn" data-filter="done">Done</button>
  </div>

  <ul id="todo-list"></ul>

  <div id="empty">
    <div class="icon">🌸</div>
    <p>Nothing here yet 🌷<br/>Add a task above to get started!</p>
  </div>

  <div class="footer">
    <span id="footer-count">0 of 0 done</span>
    <button class="clear-btn" id="clear-done">Clear completed</button>
  </div>
</div>

<script src="index.js"></script>
</body>
</html>
